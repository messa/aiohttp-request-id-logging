name: Python tests

on: [push, pull_request]

permissions:
  contents: read

jobs:

  lint:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Run ruff check
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run ty check
      run: uv run ty check

  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        # 'latest' = whatever is currently on PyPI, to catch regressions
        # with new aiohttp releases early
        # aiohttp 3.7.4 is not in the matrix: it does not run on any
        # Python version listed here (asyncio.gather(loop=...), cgi module)
        aiohttp-version: ['3.8.6', '3.9.5', '3.11.18', '3.14.1', 'latest']
        exclude:

        - python-version: '3.12'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3042:53: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

        - python-version: '3.13'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3744:45: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

        - python-version: '3.14'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3744:45: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

    steps:
    - uses: actions/checkout@v7

    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync

    - name: Install aiohttp ${{ matrix.aiohttp-version }}
      if: matrix.aiohttp-version != 'latest'
      run: uv pip install aiohttp==${{ matrix.aiohttp-version }}

    - name: Install latest aiohttp
      if: matrix.aiohttp-version == 'latest'
      run: uv pip install --upgrade aiohttp

    - name: Test with pytest
      run: uv run --no-sync pytest -vv tests
