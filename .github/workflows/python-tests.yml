name: Python tests

on: [push, pull_request]

permissions:
  contents: read

jobs:

  lint:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Run ruff check
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        aiohttp-version: ['3.7.4', '3.8.6', '3.9.5', '3.11.18', '3.14.1']
        exclude:

        - python-version: '3.10'
          aiohttp-version: '3.7.4'
          #   File "/opt/hostedtoolcache/Python/3.10.14/x64/lib/python3.10/site-packages/aiohttp/web.py", line 444, in _cancel_tasks
          #     asyncio.gather(*to_cancel, loop=loop, return_exceptions=True)
          # TypeError: gather() got an unexpected keyword argument 'loop'

        - python-version: '3.11'
          aiohttp-version: '3.7.4'
          # Same reason as above

        - python-version: '3.12'
          aiohttp-version: '3.7.4'
          # Same reason as above

        - python-version: '3.12'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3042:53: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

        - python-version: '3.13'
          aiohttp-version: '3.7.4'
          # ModuleNotFoundError: No module named 'cgi' in aiohttp/helpers.py
        - python-version: '3.13'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3744:45: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

        - python-version: '3.14'
          aiohttp-version: '3.7.4'
          # ModuleNotFoundError: No module named 'cgi' in aiohttp/helpers.py
        - python-version: '3.14'
          aiohttp-version: '3.8.6'
          # aiohttp/_websocket.c:3744:45: error: ‘PyLongObject’ {aka ‘struct _longobject’} has no member named ‘ob_digit’

    steps:
    - uses: actions/checkout@v7

    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync

    - name: Install aiohttp ${{ matrix.aiohttp-version }}
      run: uv pip install aiohttp==${{ matrix.aiohttp-version }}

    - name: Test with pytest
      run: uv run --no-sync pytest -vv tests
