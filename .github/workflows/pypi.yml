name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Build sdist and wheel
      run: uv build

    - name: Check the built distributions
      run: uvx twine check --strict dist/*

    - name: Upload the built distributions for the publish job
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

  publish:

    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: pypi
      url: https://pypi.org/project/aiohttp-request-id-logging/

    permissions:
      # needed for the OIDC token that PyPI trusted publishing verifies
      id-token: write

    steps:
    - name: Download the built distributions
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
